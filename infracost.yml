version: 0.1

resource_usage:
  # ----------------------------
  # Cloud Storage buckets
  # ----------------------------

  # bootstrap/main.tf => google_storage_bucket.tbd-state-bucket
  google_storage_bucket.tbd-state-bucket:
    storage_gb: 1
    monthly_class_a_operations: 1000
    monthly_class_b_operations: 5000
    monthly_data_retrieval_gb: 0.1
    monthly_egress_gb: 0.1

  # modules/data-pipeline/main.tf => google_storage_bucket.tbd-code-bucket
  google_storage_bucket.tbd-code-bucket:
    storage_gb: 2
    monthly_class_a_operations: 5000
    monthly_class_b_operations: 20000
    monthly_data_retrieval_gb: 1
    monthly_egress_gb: 1

  # modules/data-pipeline/main.tf => google_storage_bucket.tbd-data-bucket
  google_storage_bucket.tbd-data-bucket:
    storage_gb: 20
    monthly_class_a_operations: 10000
    monthly_class_b_operations: 50000
    monthly_data_retrieval_gb: 5
    monthly_egress_gb: 5

  # modules/vertex-ai-workbench/main.tf => google_storage_bucket.notebook-conf-bucket
  google_storage_bucket.notebook-conf-bucket:
    storage_gb: 1
    monthly_class_a_operations: 1000
    monthly_class_b_operations: 5000
    monthly_data_retrieval_gb: 0.5
    monthly_egress_gb: 0.5

  # mlops/mlflow/gcp/app_engine/storage.tf => google_storage_bucket.mlflow_artifacts_bucket
  google_storage_bucket.mlflow_artifacts_bucket:
    storage_gb: 10
    monthly_class_a_operations: 10000
    monthly_class_b_operations: 50000
    monthly_data_retrieval_gb: 2
    monthly_egress_gb: 2

  # modules/dataproc/main.tf => google_storage_bucket.dataproc_staging
  google_storage_bucket.dataproc_staging:
    storage_gb: 5
    monthly_class_a_operations: 5000
    monthly_class_b_operations: 20000
    monthly_data_retrieval_gb: 2
    monthly_egress_gb: 2

  # modules/dataproc/main.tf => google_storage_bucket.dataproc_temp
  google_storage_bucket.dataproc_temp:
    storage_gb: 5
    monthly_class_a_operations: 5000
    monthly_class_b_operations: 20000
    monthly_data_retrieval_gb: 2
    monthly_egress_gb: 2

  # ----------------------------
  # Artifact Registry (Docker)
  # ----------------------------

  # modules/gcr/main.tf => google_artifact_registry_repository.registry
  google_artifact_registry_repository.registry:
    # Conservative “workshop-scale” assumptions
    storage_gb: 5
    monthly_egress_gb: 10
